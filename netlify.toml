# ============================================================
# BrokerCrediteSibiu — netlify.toml
# Configurare pentru Netlify hosting
# ============================================================
#
# --- Workflow: local vs Netlify (minute / credite) ---
#
# Previzualizare LOCALĂ (fără Netlify):
#   npm install   # opțional, doar prima dată
#   npm run local
#   → http://localhost:8888  (sau npm run local:9000 / local:9001 pentru mai multe clone)
#
# BUILD pe Netlify — doar când vrei tu:
#   - Opțiune A: în mesajul ultimului commit include literal:  [deploy-netlify]
#     Ex: git commit -m "Fix hero [deploy-netlify]" && git push
#   - Opțiune B: Netlify → Deploys → Trigger deploy → Deploy site (ignoră filtrul)
#   - Opțiune C: în Netlify → Environment variables setează ALWAYS_NETLIFY_BUILD=1
#     (build la fiecare push; dezactivează când nu mai e nevoie)
#
# Scriptul: scripts/netlify-should-build.sh
# ============================================================

[build]
  publish = "."
  # Anulează build-ul automat dacă mesajul nu cere explicit Netlify (vezi comentarii de sus).
  ignore = "bash scripts/netlify-should-build.sh"

# ── Canonical host (evită bucle www ↔ apex) ──
# IMPORTANT: Dacă în Netlify UI este activ "Redirect www → apex",
# atunci păstrăm aceeași direcție și NU mai forțăm www din redirects.
[[redirects]]
  from = "https://www.brokercreditesibiu.ro/*"
  to   = "https://brokercreditesibiu.ro/:splat"
  status = 301
  force  = true

[[redirects]]
  from = "http://www.brokercreditesibiu.ro/*"
  to   = "https://brokercreditesibiu.ro/:splat"
  status = 301
  force  = true

[[redirects]]
  from = "http://brokercreditesibiu.ro/*"
  to   = "https://brokercreditesibiu.ro/:splat"
  status = 301
  force  = true

# ── Duplicat homepage eliminat: păstrează linkuri vechi ──
[[redirects]]
  from = "/brokercreditesibiu.html"
  to   = "/"
  status = 301

# ── Security Headers (aplicate pe toate paginile) ──
[[headers]]
  for = "/*"

  [headers.values]
    # Forțează HTTPS pentru 1 an
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

    # Previne clickjacking
    X-Frame-Options = "DENY"

    # Previne MIME sniffing
    X-Content-Type-Options = "nosniff"

    # Controlează Referrer
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Dezactivează funcții browser neutilizate
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()"

    # Content Security Policy
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://www.google-analytics.com; connect-src 'self' https://www.google-analytics.com; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self' mailto:; upgrade-insecure-requests"

# ── Cache pentru resurse statice ──
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=2592000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=2592000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=86400"
