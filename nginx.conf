# ============================================================
# BrokerCrediteSibiu — nginx.conf
# Configurare Nginx cu security headers
# Plasați în: /etc/nginx/sites-available/brokercreditesibiu.ro
# ============================================================

server {
    listen 80;
    server_name brokercreditesibiu.ro www.brokercreditesibiu.ro;

    # Redirect tot traficul HTTP → HTTPS
    return 301 https://www.brokercreditesibiu.ro$request_uri;
}

server {
    # Redirect non-www → www
    listen 443 ssl http2;
    server_name brokercreditesibiu.ro;
    return 301 https://www.brokercreditesibiu.ro$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.brokercreditesibiu.ro;

    # ── SSL (Let's Encrypt / Certbot) ──
    ssl_certificate     /etc/letsencrypt/live/brokercreditesibiu.ro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/brokercreditesibiu.ro/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;

    # ── Root fișiere site ──
    root  /var/www/brokercreditesibiu;
    index index.html;

    # ── Pagina 404 custom ──
    error_page 404 /404.html;

    # ── Security Headers ──
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://www.google-analytics.com; connect-src 'self' https://www.google-analytics.com; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self' mailto:; upgrade-insecure-requests" always;

    # Elimină header server (nu dezvăluie versiunea Nginx)
    server_tokens off;

    # ── Cache resurse statice ──
    location ~* \.(css|js)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.html$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    location = /sitemap.xml {
        expires 1d;
    }

    location = /robots.txt {
        expires 7d;
        log_not_found off;
    }

    # ── Blochează accesul la fișiere sensibile ──
    location ~* \.(env|log|sql|bak|htaccess|htpasswd|config)$ {
        deny all;
        return 404;
    }

    # ── Dezactivează listarea directorului ──
    autoindex off;

    # ── Compresie Gzip ──
    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1000;

    # ── Limitare upload size (protecție DoS) ──
    client_max_body_size 1M;
}
